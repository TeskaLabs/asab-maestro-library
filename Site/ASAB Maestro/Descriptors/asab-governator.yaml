define:
  type: rc/descriptor
  name: ASAB Governator

descriptor:
  # The REST API is at tcp/8892

  image: pcr.teskalabs.com/asab/asab-governator

  volumes:
    # For a persistency of the configuration
    - "{{SITE}}/{{INSTANCE_ID}}/conf:/conf:ro"
    # For unified access to the host docker
    - "{{SITE}}/docker/conf:/root/.docker/"
    # For a communication with a docker
    - /var/run/docker.sock:/var/run/docker.sock
    # For a manipulation with the site directory (/opt/site:/opt/site)
    - "{{SITE}}:/opt/site"
    # To change ownership of data structures if needed
    - /data:/data

  # This is critical service
  restart: always

nginx:
  api: &apiport 8892
  https:
    # Instance-specific endpoint for export-download
    # Uses Jinja2 templating to create unique locations per instance:
    #   /api/asab-governator-1/export-download -> node1:8892
    #   /api/asab-governator-2/export-download -> node2:8892
    #   etc.
    # This endpoint bypasses OAuth introspection for export functionality
    location /api/{{INSTANCE_ID}}/export-download:
      - rewrite /api/{{INSTANCE_ID}}/(.*) /$1 break
      - proxy_pass http://{{NODE_ID}}:8892
  internal:
    # Same instance-specific endpoint for internal server
    location /api/{{INSTANCE_ID}}/export-download:
      - rewrite /api/{{INSTANCE_ID}}/(.*) /$1 break
      - proxy_pass http://{{NODE_ID}}:8892

asab:
  configname: conf/asab-governator.conf
  config:
    web:
      listen: *apiport
