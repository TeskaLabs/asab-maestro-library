define:
  type: rc/descriptor
  name: ASAB Iris

descriptor:

  image: docker.teskalabs.com/asab/asab-iris

  volumes:
    # For a persistency of the configuration
    - "{{SITE}}/{{INSTANCE_ID}}/conf:/conf:ro"

asab:
  configname: conf/asab-iris.conf
  config: 
    kafka:
      topic: notifications
      group_id: asab-iris
    # [smtp] must be filled from general confguration (user)
    # [slack] must be filled from general confguration (user)
    # [variables] must be filled from general confguration (user)
    email:
      markdown_wrapper: /Templates/Wrapper/Markdown Wrapper.html
    variables:
      public_url: "{{PUBLIC_URL}}"

asab-config:
  Slack:
    __schema__:
      file:
        {
          "title": "Slack",
          "type": "object",
          "properties": {
            "slack": {
              "title": "Slack",
              "description": "Configure connection to Slack channel.",
              "type": "object",
              "additionalProperties": false,
              "properties": {
                "token": {
                  "type": "string",
                  "title": "Token",
                  "minLength": 1,
                  "$defs": {
                    "password": {
                      "type": "password"
                    }
                  }
                },
                "channel": {
                  "type": "string",
                  "title": "Channel",
                  "minLength": 1
                }
              },
              "if": { "minProperties": 1 },
              "then": { "required": ["token", "channel"] }
            }
          }
        }
    config:
      file: {}
      if_not_exists: true

  Microsoft Teams:
    __schema__:
      file:
        {
          "title": "Microsoft Teams",
          "type": "object",
          "properties": {
            "msteams": {
              "title": "Microsoft Teams",
              "description": "Configure connection to MS Teams.",
              "type": "object",
              "additionalProperties": false,
              "properties": {
                "webhook_url": {
                  "title": "Webhook URL",
                  "type": "string",
                  "format": "uri",
                  "minLength": 1
                }
              },
              "if": { "minProperties": 1 },
              "then": { "required": ["webhook_url"] }
            }
          }
        }
    config:
      file: {}
      if_not_exists: true


  Microsoft 365 Email:
    __schema__:
      file:
        {
          "title": "Microsoft 365 Email",
          "type": "object",
          "properties": {
            "m365_email": {
              "title": "Microsoft 365 Email",
              "description": "Configure Graph API for sending mail via M365.",
              "type": "object",
              "additionalProperties": false,
              "properties": {

                "mode": {
                  "type": "string",
                  "title": "Mode",
                  "enum": ["app", "delegated"],
                  "default": "app"
                },

                "api_url": {
                  "type": "string",
                  "title": "API URL",
                  "format": "uri",
                  "minLength": 1
                },
                "tenant_id": {
                  "type": "string",
                  "title": "Tenant ID",
                  "minLength": 1
                },
                "client_id": {
                  "type": "string",
                  "title": "Client ID",
                  "minLength": 1
                },
                "client_secret": {
                  "type": "string",
                  "title": "Client Secret",
                  "minLength": 1,
                  "$defs": {
                    "password": {
                      "type": "password"
                    }
                  }
                },
                "user_email": {
                  "type": "string",
                  "title": "User Email",
                  "format": "email",
                  "minLength": 1
                },

                "redirect_uri": {
                  "type": "string",
                  "title": "Redirect URI",
                  "format": "uri",
                  "minLength": 1
                }
              },

              "required": [
                "api_url",
                "tenant_id",
                "client_id",
                "client_secret",
                "user_email"
              ],

              "allOf": [
                {
                  "if": {
                    "properties": {
                      "mode": { "const": "delegated" }
                    }
                  },
                  "then": {
                    "required": ["redirect_uri"]
                  }
                }
              ]
            }
          }
        }
    config:
      file: {}
      if_not_exists: true

  SMS:
    __schema__:
      file:
        {
          "title": "SMS",
          "type": "object",
          "properties": {
          "sms": {
              "title": "SMS",
              "description": "Configure connection to SMSBrána.",
              "type": "object",
              "additionalProperties": false,
              "properties": {
                "login": {
                  "type": "string",
                  "title": "Login",
                  "minLength": 1
                },
                "password": {
                  "type": "string",
                  "title": "Password",
                  "minLength": 1,
                  "$defs": {
                    "password": {
                      "type": "password"
                    }
                  }
                },
                "api_url": {
                  "type": "string",
                  "title": "API URL",
                  "format": "uri",
                  "minLength": 1
                }
              },
              "if": { "minProperties": 1 },
              "then": { "required": ["login", "password", "api_url"] }
            }
          }
          
        }
    config:
      file: {}
      if_not_exists: true


  Push notification:
    __schema__:
      file:
        {
          "title": "Push notification",
          "type": "object",
          "properties": {
            "push": {
              "title": "Push notification",
              "description": "Configure connection to push backend (ntfy).",
              "type": "object",
              "additionalProperties": false,
              "properties": {
                "url": {
                  "title": "Base URL",
                  "type": "string",
                  "format": "uri",
                  "minLength": 1
                },
                "default_topic": {
                  "title": "Default topic",
                  "type": "string",
                  "minLength": 1
                },
                "timeout": {
                  "title": "Timeout (seconds)",
                  "type": "integer",
                  "minimum": 1,
                  "default": 10
                }
              },
              "if": { "minProperties": 1 },
              "then": { "required": ["url"] }
            }
          }
        }

    config:
      file: {}
      if_not_exists: true

nginx:
  api: 8896

  # Microsoft redirects the browser here with ?code=..., nginx rewrites the
  # public /api/asab-iris/... path to Iris's internal /authorize_ms365 route.
  https:
    location /api/asab-iris/authorize_ms365:
      - rewrite /api/asab-iris/(.*) /$1 break
      - proxy_pass http://{{NODE_ID}}:8896
